# Публикация релиза Deadlock Tweaker (Rework) для репозитория:
# https://github.com/d1n4styy/DLTweakerRework
#
# Секреты репозитория (Settings → Secrets → Actions):
#   TAURI_SIGNING_PRIVATE_KEY — содержимое ключа (или base64), см. https://v2.tauri.app/plugin/updater/
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — пароль ключа, если задан при генерации
#   RELEASE_PAT (опционально) — classic PAT с правом repo, если публикация падает с
#     «Resource not accessible by integration»: в Settings → Actions → General для Workflow permissions
#     должно быть «Read and write permissions», иначе GITHUB_TOKEN не может создать релиз.
#
# После первого успешного релиза в GitHub в релиз попадут установщик и latest.json;
# клиенты подтянут их по URL из src-tauri/tauri.conf.json → plugins.updater.endpoints

name: Publish DLTweakerRework

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Cache Tauri bundler downloads (NSIS, WebView2, …)
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\tauri
          key: tauri-bundler-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}

      - name: Install frontend deps
        run: npm ci

      - name: Текст релиза из release-notes.json
        id: relnotes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME || "";
          const ver = tag.startsWith("v") ? tag.slice(1) : tag;
          const key = "v" + ver;
          let body;
          try {
            const j = JSON.parse(fs.readFileSync("public/release-notes.json", "utf8"));
            body = j[key];
          } catch (e) {
            body = null;
          }
          if (!body || String(body).trim() === "") {
            body = "Релиз " + tag + ". Подробности см. в приложении (раздел «Что нового») или в public/release-notes.json.";
          }
          const esc = body.replace(/\r\n/g, "\n");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body<<RELNOTES_EOF\n${esc}\nRELNOTES_EOF\n`);
          NODE

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "Deadlock Tweaker (Rework) ${{ github.ref_name }}"
          releaseBody: ${{ steps.relnotes.outputs.body }}
          releaseDraft: false
          prerelease: false
